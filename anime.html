<!DOCTYPE html>
<html>

<head>
<title>Anime World</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:white;
text-align:center;

/* WALLPAPER */
background-image:url("bg2.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* dark overlay for readability */
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding-bottom:30px;
}

h1{
padding-top:30px;
font-size:36px;
}

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:30px;
}

/* card design */
.card{
background:rgba(255,255,255,0.1);
border-radius:15px;
margin:15px;
padding:10px;
backdrop-filter:blur(10px);
box-shadow:0 4px 10px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* image style */
img{
width:250px;
border-radius:10px;
}

p{
margin-top:10px;
font-size:18px;
}

/* logout button */
button{
margin-top:30px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#6c8cff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4a6cf7;
}
</style>

</head>

<body>

<div class="overlay">

<h1>Anime Collection 🎌</h1>

<div class="gallery">

<div class="card">
<img src="D:\twilight internship\anime website\anime1.jpg">
<p>Naruto</p>
</div>

<div class="card">
<img src="D:\twilight internship\anime website\anime2.jpg">
<p>One Piece</p>
</div>

<div class="card">
<img src="D:\twilight internship\anime website\anime3.jpg">
<p>Demon Slayer</p>
</div>

</div>

<button onclick="logout()">Logout</button>

</div>

<script>
function logout(){
window.location.href = "login.html";
}
</script>

</body>

</html>
