<!DOCTYPE html>
<html>

<head>
<title>Anime Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;

/* wallpaper */
background-image:url("bg1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* glass box */
.container{
text-align:center;
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
color:white;
}

h1{
font-size:32px;
margin-bottom:20px;
}

input{
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
outline:none;
width:200px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#6c8cff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4a6cf7;
}
</style>

</head>

<body>

<div class="container">
<h1>Enter Access Code</h1>

<input type="password" id="code" placeholder="Enter Code">
<br>

<button onclick="checkCode()">ENTER</button>
</div>

<script>
function checkCode(){
var userCode = document.getElementById("code").value;

if(userCode === "1234"){
window.location.href = "anime.html";
}else{
alert("Wrong Code");
}
}
</script>

</body>
</html>
